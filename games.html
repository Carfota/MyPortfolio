<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Games | Ahmed Nabil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --teal: #00e0b8;
            --teal-dim: rgba(0, 224, 184, 0.15);
            --teal-glow: rgba(0, 224, 184, 0.5);
            --purple: #7c3aed;
            --dark: #050508;
            --card: rgba(10, 8, 20, 0.88);
            --border: rgba(0, 224, 184, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Raleway', sans-serif;
            background-color: var(--dark);
            color: #ddd;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── ANIMATED BACKGROUND ── */
        .bg-layer { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
        .bg-layer::before {
            content: '';
            position: absolute;
            top: -20%; left: -10%;
            width: 700px; height: 700px;
            background: radial-gradient(ellipse, rgba(124,58,237,0.18) 0%, transparent 70%);
            animation: driftA 18s ease-in-out infinite alternate;
        }
        .bg-layer::after {
            content: '';
            position: absolute;
            bottom: -20%; right: -10%;
            width: 600px; height: 600px;
            background: radial-gradient(ellipse, rgba(0,224,184,0.12) 0%, transparent 70%);
            animation: driftB 14s ease-in-out infinite alternate;
        }
        @keyframes driftA { from { transform: translate(0,0) scale(1); } to { transform: translate(60px,80px) scale(1.15); } }
        @keyframes driftB { from { transform: translate(0,0) scale(1); } to { transform: translate(-50px,-60px) scale(1.2); } }

        .fog { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .fog-particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,224,184,0.3), transparent 60%);
            animation: floatFog linear infinite;
        }
        @keyframes floatFog {
            0%   { transform: translateY(110vh) scale(0.5); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* ── SAME SWORD AS HOME ── */
        .sword-bg {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            opacity: 0.07;
            width: min(600px, 90vw);
            filter: drop-shadow(0 0 30px var(--teal));
            animation: swordPulse 6s ease-in-out infinite;
        }
        @keyframes swordPulse {
            0%, 100% { opacity: 0.07; filter: drop-shadow(0 0 25px var(--teal)); }
            50%       { opacity: 0.13; filter: drop-shadow(0 0 55px var(--teal)); }
        }

        /* ── LAYOUT ── */
        .container {
            position: relative;
            z-index: 10;
            max-width: 960px;
            width: 100%;
            padding: 50px 24px 80px;
            text-align: center;
        }

        /* ── NAV — identical to home ── */
        nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 70px;
            animation: fadeDown 0.9s ease-out both;
        }
        .nav-link {
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #666;
            text-decoration: none;
            padding: 10px 28px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 4px;
            background: rgba(5,5,12,0.7);
            backdrop-filter: blur(8px);
            transition: all 0.35s;
        }
        .nav-link.active,
        .nav-link:hover {
            color: var(--teal);
            border-color: var(--border);
            background: var(--teal-dim);
            box-shadow: 0 0 20px rgba(0,224,184,0.1), inset 0 0 10px rgba(0,224,184,0.05);
        }

        /* ── PAGE HEADER — same structure as home ── */
        .rune-icon {
            font-size: 2.2rem;
            line-height: 1;
            margin-bottom: 18px;
            display: block;
            filter: drop-shadow(0 0 12px var(--teal));
            animation: fadeDown 0.9s ease-out 0.2s both;
            color: var(--teal);
            opacity: 0.9;
        }

        h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(2.8rem, 7vw, 5.5rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            line-height: 1.05;
            background: linear-gradient(135deg, #fff 0%, var(--teal) 50%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 25px rgba(0,224,184,0.3));
            animation: fadeDown 0.9s ease-out 0.35s both;
        }

        .subtitle {
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(0,224,184,0.55);
            margin-top: 12px;
            animation: fadeDown 0.9s ease-out 0.5s both;
        }

        /* ── DIVIDER — same as home ── */
        .divider {
            margin: 32px auto 48px;
            width: 200px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--teal), transparent);
            position: relative;
            animation: fadeDown 0.9s ease-out 0.55s both;
        }
        .divider::before {
            content: '⬡';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--teal);
            font-size: 0.6rem;
            background: var(--dark);
            padding: 0 6px;
        }

        /* ── GAMES GRID ── */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 28px;
        }

        /* ── GAME CARD ── */
        .game-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 2px;
            overflow: hidden;
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,224,184,0.05), inset 0 1px 0 rgba(255,255,255,0.04);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            text-align: left;
            animation: fadeDown 0.9s ease-out both;
        }
        .game-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0,224,184,0.45);
            box-shadow: 0 30px 70px rgba(0,0,0,0.7), 0 0 40px rgba(0,224,184,0.1);
        }
        /* Corner accents — same style as home card */
        .game-card::before,
        .game-card::after {
            content: '';
            position: absolute;
            width: 24px; height: 24px;
            border-color: var(--teal);
            border-style: solid;
            opacity: 0;
            transition: opacity 0.4s;
            z-index: 5;
        }
        .game-card::before { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
        .game-card::after  { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }
        .game-card:hover::before,
        .game-card:hover::after { opacity: 0.5; }

        /* Video */
        .video-wrapper {
            width: 100%; aspect-ratio: 16/9;
            background: #000; overflow: hidden; position: relative;
        }
        .video-wrapper::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 60%, rgba(10,8,20,0.95) 100%);
            pointer-events: none; z-index: 2;
        }
        video {
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: transform 0.5s ease;
        }
        .game-card:hover video { transform: scale(1.04); }

        /* Card body */
        .card-body { padding: 24px 26px 28px; position: relative; }

        /* Badge */
        .badge {
            display: inline-block;
            font-family: 'Cinzel', serif;
            font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
            padding: 3px 10px; border-radius: 2px; margin-bottom: 10px;
        }
        .badge-live  { background: rgba(0,224,184,0.12); color: var(--teal); border: 1px solid rgba(0,224,184,0.3); }
        .badge-dev   { background: rgba(124,58,237,0.12); color: #a78bfa;    border: 1px solid rgba(124,58,237,0.3); }
        .badge-soon  { background: rgba(255,180,0,0.1);   color: #fbbf24;    border: 1px solid rgba(251,191,36,0.3); }

        .game-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.45rem; font-weight: 700;
            color: var(--teal);
            text-shadow: 0 0 12px rgba(0,224,184,0.3);
            margin-bottom: 10px; line-height: 1.2;
        }
        .game-desc {
            font-size: 0.92rem; color: #999; line-height: 1.75;
            font-weight: 300; margin-bottom: 20px;
        }

        .tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 20px; }
        .tag {
            font-size: 0.65rem; letter-spacing: 0.12em;
            font-family: 'Cinzel', serif;
            padding: 4px 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 2px; color: #666; text-transform: uppercase;
        }

        .card-footer {
            display: flex; align-items: center; gap: 12px;
            border-top: 1px solid rgba(0,224,184,0.08);
            padding-top: 18px;
        }
        .btn-play {
            display: inline-flex; align-items: center; gap: 8px;
            font-family: 'Cinzel', serif;
            font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
            color: var(--dark); background: var(--teal);
            text-decoration: none; padding: 10px 22px;
            border-radius: 2px; transition: all 0.3s; font-weight: 700;
        }
        .btn-play:hover {
            background: #00ffce;
            box-shadow: 0 0 25px rgba(0,224,184,0.4);
            transform: translateY(-2px);
        }
        .btn-outline {
            display: inline-flex; align-items: center; gap: 8px;
            font-family: 'Cinzel', serif;
            font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
            color: var(--teal); text-decoration: none;
            padding: 10px 22px;
            border: 1px solid var(--border); border-radius: 2px;
            transition: all 0.3s; background: transparent;
        }
        .btn-outline:hover {
            background: var(--teal-dim);
            border-color: rgba(0,224,184,0.45);
        }

        /* ── FOOTER ── */
        .footer-rune {
            margin-top: 70px;
            font-size: 0.7rem; letter-spacing: 0.35em;
            color: rgba(0,224,184,0.2);
            font-family: 'Cinzel', serif; text-transform: uppercase;
            animation: fadeDown 0.9s ease-out 1s both;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .games-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<script>
    const fog = document.getElementById('fog');
    for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'fog-particle';
        const size = 40 + Math.random() * 120;
        p.style.cssText = `
            width:${size}px; height:${size}px;
            left:${Math.random()*100}%;
            animation-duration:${12+Math.random()*20}s;
            animation-delay:${-Math.random()*25}s;
            opacity:${0.2+Math.random()*0.4};
        `;
        fog.appendChild(p);
