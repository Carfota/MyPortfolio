<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Nabil | Portfolio</title>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #0f0f0f; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 20px;
        }

        .container { max-width: 850px; margin: auto; }

        header { 
            text-align: center;
            padding: 40px 0;
            animation: fadeInUp 0.8s ease-out;
        }

        h1 { color: #00ff88; font-size: 2.5rem; margin: 0; }

        .project-card { 
            background: #161616; 
            border-radius: 15px; 
            padding: 25px; 
            margin-bottom: 40px; 
            border: 1px solid #333;
            transition: all 0.3s ease;
            animation: fadeInUp 1s ease-out;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
        }

        .video-container { 
            width: 100%;
            border-radius: 12px; 
            overflow: hidden; 
            background: #000;
            margin: 20px 0;
        }

        video { width: 100%; display: block; border-radius: 12px; }

        .tag { 
            display: inline-block;
            background: #00ff8822; 
            color: #00ff88; 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-size: 13px; 
            margin-left: 10px; 
            border: 1px solid #00ff8844;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Ahmed Nabil</h1>
            <p>Developer & Writer | Specialized in Luau (Roblox Studio)</p>
        </header>

        <div class="project-card">
            <h2>مشروع OBSTCALES</h2>
            <div class="video-container">
                <video controls preload="metadata">
                    <source src="https://www.dropbox.com/scl/fi/pajp01mdq92zyifappwf6/League-of-Legends-2026.02.17-22.11.27.02.DVR-online-video-cutter.com.mp4?rlkey=ljnkxi8febfg5q7l61doz1mxa&st=vza0xput&raw=1" type="video/mp4">
                </video>
            </div>
            <div class="tags"><span class="tag">Luau</span><span class="tag">Roblox Studio</span></div>
        </div>

        <div class="project-card">
            <h2>Daily Reward System</h2>
            <div class="video-container">
                <video controls preload="metadata">
                    <source src="https://www.dropbox.com/scl/fi/bgnsxcqot57uv3dzcb6wz/Robloxstudiobeta-Gtfs2ew1zq.mp4?rlkey=z3v3oxoznlc2ahjs3390fpe7f&st=n0ts1ciz&raw=1" type="video/mp4">
                </video>
            </div>
            <div class="tags"><span class="tag">UI Design</span><span class="tag">Scripting</span></div>
        </div>
    </div>
</body>
</html>
