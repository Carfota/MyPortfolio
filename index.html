<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Nabil | Portfolio</title>
    <style>
        body { font-family: sans-serif; background-color: #0f0f0f; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        header { border-bottom: 2px solid #00ff88; padding-bottom: 20px; margin-bottom: 40px; }
        h1 { color: #00ff88; margin: 0; }
        .project-card { background: #1a1a1a; border-radius: 12px; padding: 20px; margin-bottom: 30px; border: 1px solid #333; }
        h2 { color: #fff; margin-top: 0; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .tag { background: #00ff8822; color: #00ff88; padding: 5px 12px; border-radius: 20px; font-size: 14px; margin-left: 8px; border: 1px solid #00ff8844; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Ahmed Nabil</h1>
            <p>Developer & Writer | Specialized in Luau (Roblox Studio)</p>
        </header>

        <div class="project-card">
            <h2>مشروع OBSTCALES</h2>
            <p>ده البروجكت الأساسي اللي شغال عليه حالياً، مركز فيه على نظام العقبات والفيزياء.</p>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/ID_VIDEO_HERE" allowfullscreen></iframe>
            </div>
            <div class="tags">
                <span class="tag">Luau</span>
                <span class="tag">Roblox Studio</span>
            </div>
        </div>
    </div>
</body>
</html>
