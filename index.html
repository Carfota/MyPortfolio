<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Nabil | Home</title>
    <style>
        :root { --primary: #00ff88; --bg: #050505; --card-bg: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #fff; margin: 0; background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 40px 40px; }
        .container { max-width: 1000px; margin: auto; padding: 40px 20px; }
        
        /* Nav Bar */
        nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; }
        .nav-link { color: #888; text-decoration: none; padding: 10px 25px; border: 1px solid var(--border); border-radius: 12px; transition: 0.3s; background: var(--card-bg); }
        .nav-link:hover, .nav-link.active { color: var(--primary); border-color: var(--primary); background: rgba(0, 255, 136, 0.1); }

        header { text-align: center; padding: 60px 0; }
        h1 { font-size: 3rem; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 40px; text-align: center; backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html" class="nav-link active">Home</a>
            <a href="games.html" class="nav-link">Games</a>
            <a href="systems.html" class="nav-link">Systems</a>
        </nav>
        <header>
            <h1>AhmedTheDEV</h1>
            <p style="color: #888;">A DECENT SCRIPTER FOR YOUR IDEAS IN LUAU</p>
        </header>
        <div class="welcome-card">
            <h2>أهلاً بك في بورتفوليو أحمد نبيل</h2>
            <p>اختار من القائمة فوق عشان تشوف الألعاب أو الأنظمة اللي برمجتها.</p>
        </div>
    </div>
</body>
</html>
