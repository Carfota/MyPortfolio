<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Nabil | Home</title>
    <style>
        :root { --primary: #00ff88; --bg: #050505; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: sans-serif; background-color: var(--bg); color: #fff; margin: 0; text-align: center; }
        .container { max-width: 800px; margin: auto; padding: 30px; }
        
        /* قائمة التنقل - ثابتة في كل الصفحات */
        nav { margin: 40px 0; display: flex; justify-content: center; gap: 15px; }
        .nav-link { color: #888; text-decoration: none; padding: 10px 20px; border: 1px solid var(--border); border-radius: 8px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--primary); border-color: var(--primary); background: rgba(0, 255, 136, 0.1); }

        .welcome-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 20px; padding: 50px 20px; margin-top: 20px; }
        h1 { font-size: 3rem; color: var(--primary); margin: 0 0 20px 0; }
        .highlight { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html" class="nav-link active">Home</a>
            <a href="games.html" class="nav-link">Games</a>
            <a href="systems.html" class="nav-link">Systems</a>
        </nav>

        <div class="welcome-card">
            <h1>Ahmed Nabil</h1>
            <p style="font-size: 1.2rem; color: #ccc;">
                I am a <span class="highlight">Roblox Game Developer</span>. <br>
                I make games and  advacned systems in <span class="highlight">Roblox Studio</span>.
            </p>
        </div>
    </div>
</body>
</html>
