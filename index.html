<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Nabil | Roblox Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --teal: #00e0b8;
            --teal-dim: rgba(0, 224, 184, 0.15);
            --teal-glow: rgba(0, 224, 184, 0.5);
            --purple: #7c3aed;
            --purple-dark: #4c1d95;
            --mist: rgba(160, 100, 220, 0.12);
            --dark: #050508;
            --card: rgba(10, 8, 20, 0.88);
            --border: rgba(0, 224, 184, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Raleway', sans-serif;
            background-color: var(--dark);
            color: #ddd;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── ANIMATED BACKGROUND ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        /* Radial mist blobs */
        .bg-layer::before {
            content: '';
            position: absolute;
            top: -20%; left: -10%;
            width: 700px; height: 700px;
            background: radial-gradient(ellipse, rgba(124,58,237,0.18) 0%, transparent 70%);
            animation: driftA 18s ease-in-out infinite alternate;
        }
        .bg-layer::after {
            content: '';
            position: absolute;
            bottom: -20%; right: -10%;
            width: 600px; height: 600px;
            background: radial-gradient(ellipse, rgba(0,224,184,0.12) 0%, transparent 70%);
            animation: driftB 14s ease-in-out infinite alternate;
        }
        @keyframes driftA { from { transform: translate(0,0) scale(1); } to { transform: translate(60px,80px) scale(1.15); } }
        @keyframes driftB { from { transform: translate(0,0) scale(1); } to { transform: translate(-50px,-60px) scale(1.2); } }

        /* Particle fog */
        .fog {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .fog-particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,224,184,0.3), transparent 60%);
            animation: floatFog linear infinite;
        }
        @keyframes floatFog {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* ── SWORD SVG CENTER ── */
        .sword-bg {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            opacity: 0.07;
            width: min(600px, 90vw);
            filter: drop-shadow(0 0 30px var(--teal));
            animation: swordPulse 6s ease-in-out infinite;
        }
        @keyframes swordPulse {
            0%, 100% { opacity: 0.07; filter: drop-shadow(0 0 25px var(--teal)); }
            50% { opacity: 0.13; filter: drop-shadow(0 0 55px var(--teal)); }
        }

        /* ── LAYOUT ── */
        .container {
            position: relative;
            z-index: 10;
            max-width: 960px;
            width: 100%;
            padding: 50px 24px 80px;
            text-align: center;
        }

        /* ── NAV ── */
        nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 70px;
            animation: fadeDown 0.9s ease-out both;
        }
        .nav-link {
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #666;
            text-decoration: none;
            padding: 10px 28px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 4px;
            background: rgba(5,5,12,0.7);
            backdrop-filter: blur(8px);
            transition: all 0.35s;
        }
        .nav-link.active,
        .nav-link:hover {
            color: var(--teal);
            border-color: var(--border);
            background: var(--teal-dim);
            box-shadow: 0 0 20px rgba(0,224,184,0.1), inset 0 0 10px rgba(0,224,184,0.05);
        }

        /* ── HEADER ── */
        .header {
            position: relative;
            margin-bottom: 10px;
        }

        /* Crown/rune above name */
        .rune-icon {
            font-size: 2.2rem;
            line-height: 1;
            margin-bottom: 18px;
            display: block;
            filter: drop-shadow(0 0 12px var(--teal));
            animation: fadeDown 0.9s ease-out 0.2s both;
            color: var(--teal);
            opacity: 0.9;
        }

        h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(2.8rem, 7vw, 5.5rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            line-height: 1.05;
            background: linear-gradient(135deg, #fff 0%, var(--teal) 50%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 25px rgba(0,224,184,0.3));
            animation: fadeDown 0.9s ease-out 0.35s both;
        }

        .subtitle {
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(0,224,184,0.55);
            margin-top: 12px;
            animation: fadeDown 0.9s ease-out 0.5s both;
        }

        /* ── DIVIDER ── */
        .divider {
            margin: 32px auto;
            width: 200px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--teal), transparent);
            position: relative;
            animation: fadeDown 0.9s ease-out 0.55s both;
        }
        .divider::before {
            content: '⬡';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--teal);
            font-size: 0.6rem;
            background: var(--dark);
            padding: 0 6px;
        }

        /* ── WELCOME CARD ── */
        .welcome-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 52px 48px;
            margin-top: 20px;
            backdrop-filter: blur(16px);
            position: relative;
            overflow: hidden;
            animation: fadeDown 0.9s ease-out 0.7s both;
            box-shadow:
                0 25px 60px rgba(0,0,0,0.7),
                0 0 0 1px rgba(0,224,184,0.05),
                inset 0 1px 0 rgba(255,255,255,0.04);
        }
        /* Corner accents */
        .welcome-card::before,
        .welcome-card::after {
            content: '';
            position: absolute;
            width: 24px; height: 24px;
            border-color: var(--teal);
            border-style: solid;
            opacity: 0.5;
        }
        .welcome-card::before { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
        .welcome-card::after  { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

        /* Inner card glow */
        .card-glow {
            position: absolute;
            top: -60px; left: 50%;
            transform: translateX(-50%);
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(0,224,184,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .description {
            font-size: 1.2rem;
            color: #bbb;
            line-height: 1.9;
            font-weight: 300;
            position: relative;
        }

        .highlight {
            color: var(--teal);
            font-weight: 600;
            text-shadow: 0 0 12px rgba(0,224,184,0.4);
        }

        .inline-link {
            color: var(--teal);
            text-decoration: none;
            font-weight: 600;
            position: relative;
            transition: all 0.3s;
        }
        .inline-link::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(to right, var(--teal), transparent);
            transition: opacity 0.3s;
        }
        .inline-link:hover {
            color: #fff;
            text-shadow: 0 0 15px rgba(0,224,184,0.6);
        }

        /* ── STATS ROW ── */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 2px;
            margin-top: 40px;
            animation: fadeDown 0.9s ease-out 0.85s both;
        }
        .stat-box {
            flex: 1;
            max-width: 180px;
            padding: 24px 16px;
            background: rgba(0,224,184,0.04);
            border: 1px solid rgba(0,224,184,0.12);
            text-align: center;
            transition: all 0.3s;
        }
        .stat-box:first-child { border-radius: 2px 0 0 2px; }
        .stat-box:last-child  { border-radius: 0 2px 2px 0; }
        .stat-box:hover {
            background: rgba(0,224,184,0.09);
            border-color: rgba(0,224,184,0.35);
            transform: translateY(-3px);
        }
        .stat-num {
            font-family: 'Cinzel Decorative', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--teal);
            text-shadow: 0 0 15px rgba(0,224,184,0.5);
            display: block;
        }
        .stat-label {
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #555;
            margin-top: 6px;
            font-family: 'Cinzel', serif;
        }

        /* ── SOCIAL ── */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 52px;
            animation: fadeDown 0.9s ease-out 1s both;
        }
        .social-icon {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #666;
            text-decoration: none;
            padding: 14px 30px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 2px;
            background: rgba(5,5,12,0.7);
            backdrop-filter: blur(8px);
            transition: all 0.35s;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .social-icon:hover {
            color: var(--teal);
            border-color: var(--teal);
            background: var(--teal-dim);
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0,224,184,0.15), 0 0 0 1px rgba(0,224,184,0.2);
        }
        .social-icon i { font-size: 1rem; }

        /* ── FOOTER RUNE ── */
        .footer-rune {
            margin-top: 60px;
            font-size: 0.7rem;
            letter-spacing: 0.35em;
            color: rgba(0,224,184,0.2);
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            animation: fadeDown 0.9s ease-out 1.1s both;
        }

        /* ── KEYFRAMES ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .welcome-card { padding: 36px 24px; }
            .social-links { flex-direction: column; align-items: center; }
            .social-icon { width: 220px; justify-content: center; }
            .stats-row { flex-direction: column; align-items: center; }
            .stat-box { max-width: 100%; width: 100%; border-radius: 2px !important; }
        }
    </style>
</head>
<body>

<!-- Animated background -->
<div class="bg-layer"></div>
<div class="fog" id="fog"></div>

<!-- Viego's Sword — SVG drawn inline, no image needed -->
<svg class="sword-bg" viewBox="0 0 200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Blade -->
  <defs>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#003d30"/>
      <stop offset="40%"  stop-color="#00e0b8"/>
      <stop offset="60%"  stop-color="#00e0b8"/>
      <stop offset="100%" stop-color="#003d30"/>
    </linearGradient>
    <linearGradient id="runeGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00e0b8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Blade body -->
  <polygon points="100,10 112,600 100,640 88,600" fill="url(#bladeGrad)" filter="url(#glow)" opacity="0.9"/>
  <!-- Blade edge line -->
  <line x1="100" y1="10" x2="100" y2="620" stroke="#00e0b8" stroke-width="0.5" opacity="0.6"/>
  <!-- Rune marks on blade -->
  <g fill="none" stroke="url(#runeGlow)" stroke-width="1.2" opacity="0.8" filter="url(#glow)">
    <rect x="94" y="120" width="12" height="12" rx="1" transform="rotate(45 100 126)"/>
    <rect x="94" y="200" width="10" height="10" rx="1" transform="rotate(45 100 205)"/>
    <rect x="94" y="280" width="12" height="12" rx="1" transform="rotate(45 100 286)"/>
    <rect x="94" y="360" width="10" height="10" rx="1" transform="rotate(45 100 365)"/>
    <rect x="94" y="440" width="12" height="12" rx="1" transform="rotate(45 100 446)"/>
  </g>

  <!-- Cross-guard -->
  <path d="M40,640 Q100,620 160,640 L165,660 Q100,645 35,660 Z" fill="#00e0b8" opacity="0.7" filter="url(#glow)"/>
  <!-- Guard gems -->
  <ellipse cx="45"  cy="650" rx="5" ry="4" fill="#7c3aed" opacity="0.9"/>
  <ellipse cx="155" cy="650" rx="5" ry="4" fill="#7c3aed" opacity="0.9"/>
  <ellipse cx="100" cy="642" rx="7" ry="5" fill="#00e0b8" opacity="1" filter="url(#glow)"/>

  <!-- Handle -->
  <rect x="90" y="660" width="20" height="90" rx="3" fill="#1a0a2e" stroke="#7c3aed" stroke-width="1" opacity="0.9"/>
  <!-- Wrap lines -->
  <g stroke="rgba(124,58,237,0.5)" stroke-width="1">
    <line x1="90" y1="675" x2="110" y2="675"/>
    <line x1="90" y1="690" x2="110" y2="690"/>
    <line x1="90" y1="705" x2="110" y2="705"/>
    <line x1="90" y1="720" x2="110" y2="720"/>
    <line x1="90" y1="735" x2="110" y2="735"/>
  </g>
  <!-- Pommel -->
  <ellipse cx="100" cy="758" rx="18" ry="10" fill="#0d0d1a" stroke="#00e0b8" stroke-width="1.2" filter="url(#glow)"/>
  <ellipse cx="100" cy="757" rx="8" ry="5" fill="#00e0b8" opacity="0.6"/>
</svg>

<div class="container">
    <nav>
        <a href="index.html"   class="nav-link active">Home</a>
        <a href="games.html"   class="nav-link">Games</a>
        <a href="systems.html" class="nav-link">Systems</a>
    </nav>

    <!-- Crown icon -->
    <span class="rune-icon">⚜</span>

    <div class="header">
        <h1>Ahmed Nabil</h1>
        <p class="subtitle">&nbsp;·&nbsp; Roblox Studio</p>
    </div>

    <div class="divider"></div>

    <div class="welcome-card">
        <div class="card-glow"></div>
        <p class="description">
            I am a <span class="highlight">Roblox Game Developer</span> who builds<br>
            Games<br><br>
            Forge your experience through my
            <a href="games.html" class="inline-link">Games</a>
            and the
            <a href="systems.html" class="inline-link">Systems</a>
            that power them —<br>
            built with obsession inside <span class="highlight">Roblox Studio</span>.
        </p>
    </div>

    <div class="stats-row">
        <div class="stat-box">
            <span class="stat-num" id="cnt-games">WIP(1)</span>
            <span class="stat-label">Games Built</span>
        </div>
        <div class="stat-box">
            <span class="stat-num" id="cnt-systems">3</span>
            <span class="stat-label">Systems</span>
        </div>
        <div class="stat-box">
            <span class="stat-num" id="cnt-years">1</span>
            <span class="stat-label">Years Dev</span>
        </div>
    </div>

    <div class="social-links">
        <a href="https://www.roblox.com/users/YOUR_ID/profile" target="_blank" class="social-icon">
            <!-- Official Roblox logo mark -->
            <svg width="18" height="18" viewBox="0 0 32 32" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
                <path d="M6.073 0L0 25.927 25.927 32 32 6.073ZM20.314 20.615l-8.656-2.299 2.3-8.656 8.655 2.3z"/>
            </svg>
            Roblox
        </a>
        <a href="https://discord.com/users/YOUR_ID" target="_blank" class="social-icon">
            <!-- Official Discord logo mark -->
            <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
                <path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 11.1 105.25 105.25 0 0 0 32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15ZM42.45 65.69C36.18 65.69 31 60 31 53s5-12.74 11.43-12.74S54 46 53.89 53s-5.05 12.69-11.44 12.69Zm42.24 0C78.41 65.69 73.25 60 73.25 53s5-12.74 11.44-12.74S96.23 46 96.12 53s-5.04 12.69-11.43 12.69Z"/>
            </svg>
            Discord
        </a>
    </div>

    <p class="footer-rune">From &nbsp;·&nbsp; Egypt. Cairo</p>
</div>

<script>
    // Fog particles
    const fog = document.getElementById('fog');
    for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'fog-particle';
        const size = 40 + Math.random() * 120;
        p.style.cssText = `
            width:${size}px; height:${size}px;
            left:${Math.random()*100}%;
            animation-duration:${12+Math.random()*20}s;
            animation-delay:${-Math.random()*25}s;
            opacity:${0.2+Math.random()*0.4};
        `;
        fog.appendChild(p);
    }

    // Count-up animation
    function countUp(el, target, duration = 1600, delay = 0) {
        setTimeout(() => {
            let start = 0;
            const step = target / (duration / 16);
            const timer = setInterval(() => {
                start = Math.min(start + step, target);
                el.textContent = Math.floor(start) + (target > 10 ? '+' : '');
                if (start >= target) clearInterval(timer);
            }, 16);
        }, delay);
    }

    // ← Edit these numbers to match your real stats
    countUp(document.getElementById('cnt-games'),   8,  1400, 1200);
    countUp(document.getElementById('cnt-systems'), 15, 1600, 1400);
    countUp(document.getElementById('cnt-years'),   3,  1000, 1600);
</script>
</body>
</html>
