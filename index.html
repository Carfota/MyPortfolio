<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Nabil | Viego Dev</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            /* باليتة ألوان Viego */
            --viego-primary: #00e0b8; /* التركواز الملعون */
            --viego-dark-bg: #030303; /* الأسود الملكي */
            --viego-card: rgba(18, 18, 18, 0.8); /* الرمادي الغامق */
            --viego-border: rgba(0, 224, 184, 0.2); 
            --discord: #5865F2;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--viego-dark-bg); 
            color: #eee; 
            margin: 0; 
            /* خلفية بتأثير ضباب أسود وتركواز خفيف */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 224, 184, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 224, 184, 0.05) 0%, transparent 40%);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        .container { max-width: 900px; width: 100%; padding: 40px 20px; text-align: center; }
        
        /* الأنميشن */
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; animation: fadeInUp 0.8s ease-out forwards; }
        .nav-link { color: #888; text-decoration: none; padding: 10px 25px; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; transition: 0.3s; background: var(--viego-card); font-weight: bold; }
        .nav-link.active { color: var(--viego-primary); border-color: var(--viego-primary); background: rgba(0, 224, 184, 0.1); }

        /* أيقونة السيف الملعون */
        .viego-sword {
            font-size: 5rem;
            color: var(--viego-primary);
            filter: drop-shadow(0 0 15px var(--viego-primary));
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.1s forwards;
            margin-bottom: -15px;
        }

        h1 { 
            font-size: 4.2rem; margin: 0; 
            background: linear-gradient(to right, #fff, var(--viego-primary)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 10px rgba(0, 224, 184, 0.4));
            opacity: 0; animation: fadeInUp 0.8s ease-out 0.3s forwards; 
        }

        .welcome-card { 
            background: var(--viego-card); border: 1px solid var(--viego-border); border-radius: 24px; 
            padding: 50px 40px; margin-top: 25px; backdrop-filter: blur(10px); 
            opacity: 0; animation: fadeInUp 0.8s ease-out 0.5s forwards; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .description { font-size: 1.35rem; color: #ccc; margin-bottom: 30px; line-height: 1.6; }
        .highlight { color: var(--viego-primary); font-weight: bold; filter: drop-shadow(0 0 5px rgba(0, 224, 184, 0.4)); }

        /* اللينكات اللي جوه الكلام */
        .inline-link { color: var(--viego-primary); text-decoration: none; font-weight: bold; border-bottom: 2px solid rgba(0, 224, 184, 0.3); transition: 0.3s; }
        .inline-link:hover { background: rgba(0, 224, 184, 0.1); border-bottom-color: var(--viego-primary); text-shadow: 0 0 10px rgba(0, 224, 184, 0.6); }

        /* مهاراتك */
        .skills-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .skill-tag { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; color: #aaa; transition: 0.3s; }
        .skill-tag:hover { border-color: var(--viego-primary); color: var(--viego-primary); transform: translateY(-3px); }

        /* السوشيال ميديا */
        .social-links { margin-top: 60px; display: flex; justify-content: center; gap: 20px; opacity: 0; animation: fadeInUp 0.8s ease-out 0.7s forwards; }
        .social-icon { 
            display: flex; align-items: center; gap: 10px;
            color: #888; text-decoration: none; padding: 12px 25px; 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; 
            background: var(--viego-card); transition: 0.3s; font-weight: bold;
        }

        /* ألوان الهوفر للسوشيال ميديا */
        .social-icon.roblox:hover { color: #fff; border-color: #fff; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); transform: translateY(-5px); }
        .social-icon.discord:hover { color: var(--discord); border-color: var(--discord); box-shadow: 0 0 20px rgba(88, 101, 242, 0.2); transform: translateY(-5px); }

        @media (max-width: 600px) { h1 { font-size: 2.8rem; } .description { font-size: 1.1rem; } .viego-sword { font-size: 4rem; } .social-links { flex-direction: column; align-items: center; } }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <a href="index.html" class="nav-link active">Home</a>
            <a href="games.html" class="nav-link">Games</a>
            <a href="systems.html" class="nav-link">Systems</a>
        </nav>

        <div class="viego-sword"><i class="fa-solid fa-khanda"></i></div>

        <h1>Ahmed Nabil</h1>
        
        <div class="welcome-card">
            <p class="description">
                I am a <span class="highlight">Roblox Game Developer</span>. <br>
                I build high-quality 
                <a href="games.html" class="inline-link">Games</a> 
                and advanced 
                <a href="systems.html" class="inline-link">Systems</a> 
                in <span class="highlight">Roblox Studio</span>.
            </p>

            <div class="skills-container">
                <div class="skill-tag">Luau Scripting</div>
                <div class="skill-tag">UI/UX Design</div>
                <div class="skill-tag">DataStores</div>
                <div class="skill-tag">Optimization</div>
            </div>
        </div>

        <div class="social-links">
            <a href="https://www.roblox.com/users/YOUR_ID/profile" target="_blank" class="social-icon roblox">
                <i class="fa-solid fa-cube"></i> ROBLOX
            </a>

            <a href="https://discord.com/users/YOUR_ID" target="_blank" class="social-icon discord">
                <i class="fa-brands fa-discord"></i> DISCORD
            </a>
        </div>
    </div>

</body>
</html>
