<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Nabil | Portfolio</title>
    <style>
        /* أنيميشن دخول الصفحة */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f0f0f; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 20px;
            line-height: 1.6;
        }

        .container { max-width: 850px; margin: auto; }

        header { 
            text-align: center;
            padding: 50px 0;
            animation: fadeInUp 0.8s ease-out;
        }

        h1 { color: #00ff88; font-size: 2.8rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        p.subtitle { color: #888; font-size: 1.1rem; margin-top: 5px; }

        .project-card { 
            background: #161616; 
            border-radius: 15px; 
            padding: 25px; 
            margin-bottom: 40px; 
            border: 1px solid #333;
            transition: all 0.3s ease;
            animation: fadeInUp 1s ease-out;
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: #00ff88;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.1);
        }

        h2 { color: #fff; margin-top: 0; font-size: 1.5rem; }
        .description { color: #aaa; margin-bottom: 20px; }

        .media-container { 
            width: 100%;
            border-radius: 12px; 
            overflow: hidden; 
            background: #000;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        /* تنسيق الفيديو والصور */
        video, img { width: 100%; display: block; border-radius: 12px; }

        .tags { display: flex; gap: 10px; flex-wrap: wrap; }
        .tag { 
            background: #00ff8815; 
            color: #00ff88; 
            padding: 6px 15px; 
            border-radius: 20px; 
            font-size: 13px; 
            border: 1px solid #00ff8830;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Ahmed Nabil</h1>
            <p class="subtitle">Developer & Writer | Specialized in Luau (Roblox Studio)</p>
        </header>

        <div class="project-card">
            <h2>مشروع OBSTCALES</h2>
            <p class="description"></p>
            <div class="media-container">
                <video controls preload="metadata">
                    <source src="https://www.dropbox.com/scl/fi/pajp01mdq92zyifappwf6/League-of-Legends-2026.02.17-22.11.27.02.DVR-online-video-cutter.com.mp4?rlkey=ljnkxi8febfg5q7l61doz1mxa&st=vza0xput&raw=1" type="video/mp4">
                    متصفحك لا يدعم تشغيل الفيديو.
                </video>
            </div>
            <div class="tags">
                <span class="tag">Luau</span>
                <span class="tag">Roblox Studio</span>
                <span class="tag">Physics</span>
            </div>
        </div>

        <div class="project-card">
            <h2>Daily Reward System</h2>
            <p class="description"></p>
            <div class="media-container">
                <img src="https://dl.dropboxusercontent.com/scl/fi/974zfxqjeebtrjleg48yu/RobloxStudioBeta_GTFs2eW1ZQ.gif" alt="Daily Reward System UI">
            </div>
            <div class="tags">
                <span class="tag">UI Design</span>
                <span class="tag">Scripting</span>
                <span class="tag">DataStore</span>
            </div>
        </div>

    </div>

</body>
</html>
